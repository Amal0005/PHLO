services:

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./Backend
    ports:
      - "5000:5000"
    env_file:
      - ./Backend/.env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NODE_ENV=production
    depends_on:
      redis:
        condition: service_started

  frontend:
    build:
      context: ./Frontend
      args:
        - VITE_BASE_URL=http://localhost:5000/api
    ports:
      - "5173:80"
    depends_on:
      - backend

