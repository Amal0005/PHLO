services:
  redis:
    image: redis:alpine
    container_name: phlo_redis
    # ports:
    #   - "6379:6379"
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - phlo_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    image: ${DOCKERHUB_USERNAME}/${DOCKER_IMAGE_NAME}:latest
    build:
      context: ./Backend
    container_name: phlo_backend
    restart: always
    env_file:
      - ./Backend/.env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NODE_ENV=production
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5000}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    networks:
      - phlo_network
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    image: ${DOCKERHUB_USERNAME}/${DOCKER_FRONTEND_IMAGE_NAME}:latest
    build:
      context: ./Frontend
    container_name: phlo_frontend
    restart: always
    networks:
      - phlo_network
    environment:
      - VITE_BASE_URL=/api
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: phlo_nginx
    ports:
      - "5000:5000"
    restart: always
    volumes:
      - ./Backend/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - phlo_network
    depends_on:
      - backend
      - frontend

volumes:
  redis_data:

networks:
  phlo_network:
    name: phlo_network
    driver: bridge
