services:
  redis:
    image: redis:alpine
    container_name: phlo_redis
    ports:
      - "6379:6379"
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - phlo_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./Backend
    container_name: phlo_backend
    restart: always
    env_file:
      - ./Backend/.env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NODE_ENV=production
      - FRONTEND_URL=http://localhost:5173
    networks:
      - phlo_network
    depends_on:
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: phlo_nginx
    ports:
      - "5000:5000"
    restart: always
    volumes:
      - ./Backend/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - phlo_network
    depends_on:
      - backend

volumes:
  redis_data:

networks:
  phlo_network:
    name: phlo_network
    driver: bridge
