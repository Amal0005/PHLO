name: Deploy Backend to Docker Hub
on:
  push:
    branches: [ "main" ]
    paths:
      - 'Backend/**'
      - '.github/workflows/pipeline.yml'

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  AWS_EC2_HOST: ${{ secrets.AWS_EC2_HOST }}
  AWS_EC2_USER: ${{ secrets.AWS_EC2_USER }}

jobs:
  deploy:
    name: Build & Deploy Backend
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: ./Backend
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/phlo-backend:latest

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.AWS_EC2_HOST }}
        username: ${{ secrets.AWS_EC2_USER }}
        key: ${{ secrets.AWS_EC2_SSH_KEY }}
        script: |
          # Login to Docker Hub on EC2
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | sudo docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

          # Create app directory if not exists
          mkdir -p ~/phlo-app
          cd ~/phlo-app
          
          # 🔥 UPDATE .env FILE (APPENDING INSTEAD OF OVERWRITING)
          touch .env
          printf "GOOGLE_CREDENTIALS_JSON=%s\n" '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' >> .env
          printf "REDIS_PASSWORD=%s\n" '${{ secrets.REDIS_PASSWORD }}' >> .env
                    
          # Create/Update docker-compose.yml 
          # Removed mongo service as requested (using MongoDB Atlas)
          # Keeping Redis local/containerized
          cat <<EOF > docker-compose.yml
          version: '3.8'

          services:
            server:
              image: ${{ secrets.DOCKERHUB_USERNAME }}/phlo-backend:latest
              container_name: phlo-server
              restart: always
              ports:
                - "5000:5000"
              env_file:
                - .env
              depends_on:
                - redis
              networks:
                - app-network

            redis:
              image: redis:alpine
              container_name: redis
              restart: always
              ports:
                - "6379:6379"
              networks:
                - app-network

          networks:
            app-network:
              driver: bridge
          EOF
          
          # Pull latest images
          sudo docker compose pull
          
          # Clean restart of the stack
          sudo docker compose down
          sudo docker compose up -d
          
          # Wait 5 seconds for Redis to warm up
          sleep 5
          
          # Show status of all containers
          sudo docker ps
          
          # Clean up old/unused images
          sudo docker image prune -f

          echo "🚀 Backend deployment successful"
