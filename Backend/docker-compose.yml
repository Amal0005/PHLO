version: "3.9"

services:
  redis:
    image: redis:alpine
    container_name: phlo_redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - phlo_network

  backend:
    build: .
    container_name: phlo_backend
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - FRONTEND_URL=https://phlo.website
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NODE_ENV=production
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      - redis
    networks:
      - phlo_network
    volumes:
      - ./phlo-483705-7df390b1c765.json:/usr/src/app/phlo-483705-7df390b1c765.json

volumes:
  redis_data:

networks:
  phlo_network:
    driver: bridge