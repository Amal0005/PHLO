version: "3.9"

services:
  redis:
    image: redis:alpine
    container_name: phlo_redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - phlo_network

  backend:
    build: .
    container_name: phlo_backend
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NODE_ENV=production
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - GOOGLE_CREDENTIALS_JSON=${GOOGLE_CREDENTIALS_JSON}

    depends_on:
      - redis
    networks:
      - phlo_network

volumes:
  redis_data:

networks:
  phlo_network:
    driver: bridge